name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════
  # Job 1: Backend - Build & Test with Coverage
  # ═══════════════════════════════════════════
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-test-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests with coverage
        run: ./mvnw -B test -Dspring.profiles.active=test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: ai-test-backend/target/site/jacoco/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: ai-test-backend/target/surefire-reports/
          retention-days: 14

  # ═══════════════════════════════════════════
  # Job 2: Frontend - Type Check & Build
  # ═══════════════════════════════════════════
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-test-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ai-test-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ai-test-frontend/dist/
          retention-days: 7

  # ═══════════════════════════════════════════
  # Job 3: E2E Tests (Playwright)
  # ═══════════════════════════════════════════
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      # --- Java (for backend) ---
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # --- Node (for frontend dev server & Playwright) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # --- Install frontend deps (for vite dev server proxy) ---
      - name: Install frontend dependencies
        working-directory: ai-test-frontend
        run: npm ci

      # --- Start backend ---
      - name: Start backend (H2 test profile)
        working-directory: ai-test-backend
        run: |
          nohup ./mvnw spring-boot:run -Dspring-boot.run.profiles=test > backend.log 2>&1 &
          echo "Backend PID: $!"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/auth/login -X POST \
               -H "Content-Type: application/json" \
               -d '{"username":"admin","password":"admin123"}' > /dev/null 2>&1; then
              echo "✅ Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Backend failed to start"
          cat backend.log
          exit 1

      # --- Start frontend dev server (provides /api proxy to backend) ---
      - name: Start frontend dev server
        working-directory: ai-test-frontend
        run: |
          nohup npx vite --port 3000 --host > vite.log 2>&1 &
          echo "Frontend PID: $!"
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "✅ Frontend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Frontend failed to start"
          cat vite.log
          exit 1

      # --- Install Playwright ---
      - name: Install Playwright
        working-directory: ai-test-playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # --- Run E2E tests ---
      - name: Run Playwright tests
        working-directory: ai-test-playwright
        run: npx playwright test

      # --- Upload results ---
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ai-test-playwright/playwright-report/
          retention-days: 30

      - name: Upload test failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures
          path: |
            ai-test-playwright/test-results/
          retention-days: 14

      - name: Upload backend logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: ai-test-backend/backend.log
          retention-days: 7
